<script>
    (function () {
        const startAnalysisBtn = document.getElementById("startAnalysisBtn");
        if (!startAnalysisBtn) {
            return;
        }

        startAnalysisBtn.addEventListener("click", function () {
            const isLoggedIn = localStorage.getItem("isLoggedIn") === "1";
            window.location.href = isLoggedIn ? "../日志上传/code.html" : "../登录/code.html";
        });
    })();

    (function () {
        const shinyNodes = Array.from(document.querySelectorAll(".shiny-text"));
        if (!shinyNodes.length) {
            return;
        }

        const prefersReducedMotion = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        if (prefersReducedMotion) {
            return;
        }

        shinyNodes.forEach(function (node) {
            const speed = Math.max(0.2, Number(node.dataset.shinySpeed || 2));
            const delay = Math.max(0, Number(node.dataset.shinyDelay || 0));
            const direction = node.dataset.shinyDirection === "right" ? -1 : 1;
            const yoyo = node.dataset.shinyYoyo === "true";
            const pauseOnHover = node.dataset.shinyPauseOnHover === "true";
            const spread = node.dataset.shinySpread || "120deg";
            const color = node.dataset.shinyColor || "#352E2A";
            const shineColor = node.dataset.shinyShineColor || "#F7F2E8";

            node.style.setProperty("--shiny-spread", spread);
            node.style.setProperty("--shiny-color", color);
            node.style.setProperty("--shiny-shine-color", shineColor);

            let elapsed = 0;
            let last = null;
            let paused = false;
            const animationDuration = speed * 1000;
            const delayDuration = delay * 1000;

            if (pauseOnHover) {
                node.addEventListener("mouseenter", function () {
                    paused = true;
                    last = null;
                });

                node.addEventListener("mouseleave", function () {
                    paused = false;
                    last = null;
                });
            }

            function updateBackgroundByProgress(progress) {
                const bgPos = 150 - progress * 2;
                node.style.backgroundPosition = bgPos + "% center";
            }

            function tick(time) {
                if (paused) {
                    requestAnimationFrame(tick);
                    return;
                }

                if (last === null) {
                    last = time;
                    requestAnimationFrame(tick);
                    return;
                }

                elapsed += time - last;
                last = time;

                let progress = 0;

                if (yoyo) {
                    const cycleDuration = animationDuration + delayDuration;
                    const fullCycle = cycleDuration * 2;
                    const cycleTime = elapsed % fullCycle;

                    if (cycleTime < animationDuration) {
                        const p = (cycleTime / animationDuration) * 100;
                        progress = direction === 1 ? p : 100 - p;
                    } else if (cycleTime < cycleDuration) {
                        progress = direction === 1 ? 100 : 0;
                    } else if (cycleTime < cycleDuration + animationDuration) {
                        const reverseTime = cycleTime - cycleDuration;
                        const p = 100 - (reverseTime / animationDuration) * 100;
                        progress = direction === 1 ? p : 100 - p;
                    } else {
                        progress = direction === 1 ? 0 : 100;
                    }
                } else {
                    const cycleDuration = animationDuration + delayDuration;
                    const cycleTime = elapsed % cycleDuration;

                    if (cycleTime < animationDuration) {
                        const p = (cycleTime / animationDuration) * 100;
                        progress = direction === 1 ? p : 100 - p;
                    } else {
                        progress = direction === 1 ? 100 : 0;
                    }
                }

                updateBackgroundByProgress(progress);
                requestAnimationFrame(tick);
            }

            requestAnimationFrame(tick);
        });
    })();

    (function () {
        const canvas = document.getElementById("antigravityCanvas");
        if (!canvas) {
            return;
        }

        const prefersReducedMotion = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        if (prefersReducedMotion) {
            return;
        }

        const ctx = canvas.getContext("2d");
        if (!ctx) {
            return;
        }

        const config = {
            count: 1200,
            magnetRadius: 140,
            ringRadius: 112,
            waveSpeed: 0.018,
            waveAmplitude: 10,
            lerpSpeed: 0.08,
            particleSize: 5.5,
            pulseSpeed: 0.08,
            autoAnimate: true
        };

        const colors = ["rgba(0,0,0,1)", "rgba(15,15,15,1)", "rgba(30,30,30,1)"];
        const particles = [];
        const pointer = { x: window.innerWidth * 0.5, y: window.innerHeight * 0.58 };
        const smoothPointer = { x: pointer.x, y: pointer.y };
        const lastPointer = { x: pointer.x, y: pointer.y, t: performance.now() };
        let animationId = 0;

        function random(min, max) {
            return min + Math.random() * (max - min);
        }

        function initParticles() {
            particles.length = 0;
            for (let i = 0; i < config.count; i++) {
                const x = random(0, canvas.width);
                const y = random(0, canvas.height);
                particles.push({
                    x: x,
                    y: y,
                    z: random(-120, 120),
                    cx: x,
                    cy: y,
                    t: random(0, 100),
                    speed: random(0.008, 0.02),
                    radiusOffset: random(-10, 10),
                    colorIndex: i % colors.length
                });
            }
        }

        function resizeCanvas() {
            const dpr = Math.min(window.devicePixelRatio || 1, 2);
            canvas.width = Math.floor(window.innerWidth * dpr);
            canvas.height = Math.floor(window.innerHeight * dpr);
            canvas.style.width = window.innerWidth + "px";
            canvas.style.height = window.innerHeight + "px";
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            initParticles();
        }

        function onPointerMove(e) {
            pointer.x = e.clientX;
            pointer.y = e.clientY;
            lastPointer.x = e.clientX;
            lastPointer.y = e.clientY;
            lastPointer.t = performance.now();
        }

        function draw(now) {
            const idleMs = now - lastPointer.t;
            if (config.autoAnimate && idleMs > 1800) {
                const t = now * 0.001;
                pointer.x = window.innerWidth * 0.5 + Math.sin(t * 0.8) * (window.innerWidth * 0.18);
                pointer.y = window.innerHeight * 0.58 + Math.cos(t * 1.1) * (window.innerHeight * 0.1);
            }

            smoothPointer.x += (pointer.x - smoothPointer.x) * 0.06;
            smoothPointer.y += (pointer.y - smoothPointer.y) * 0.06;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < particles.length; i++) {
                const p = particles[i];
                p.t += p.speed;

                const projection = 1 - p.z / 420;
                const tx = smoothPointer.x * projection;
                const ty = smoothPointer.y * projection;
                const dx = p.x - tx;
                const dy = p.y - ty;
                const dist = Math.sqrt(dx * dx + dy * dy);

                let targetX = p.x;
                let targetY = p.y;

                if (dist < config.magnetRadius) {
                    const angle = Math.atan2(dy, dx);
                    const wave = Math.sin(p.t / config.waveSpeed + angle) * config.waveAmplitude;
                    const currentRing = config.ringRadius + wave + p.radiusOffset;
                    targetX = tx + currentRing * Math.cos(angle);
                    targetY = ty + currentRing * Math.sin(angle);
                }

                p.cx += (targetX - p.cx) * config.lerpSpeed;
                p.cy += (targetY - p.cy) * config.lerpSpeed;

                const ringDist = Math.abs(Math.sqrt((p.cx - tx) * (p.cx - tx) + (p.cy - ty) * (p.cy - ty)) - config.ringRadius);
                const nearRing = Math.max(0, 1 - ringDist / 60);
                const pulse = 0.8 + Math.sin(now * 0.001 * (3 + p.speed * 50) + p.t * config.pulseSpeed) * 0.3;
                const baseSize = Math.max(0.8, config.particleSize * nearRing * pulse * 0.6 + 0.6);
                const size = baseSize;

                ctx.beginPath();
                ctx.fillStyle = colors[p.colorIndex];
                ctx.arc(p.cx, p.cy, size, 0, Math.PI * 2);
                ctx.fill();
            }

            animationId = requestAnimationFrame(draw);
        }

        resizeCanvas();
        window.addEventListener("resize", resizeCanvas);
        window.addEventListener("pointermove", onPointerMove, { passive: true });
        animationId = requestAnimationFrame(draw);

        window.addEventListener("beforeunload", function cleanup() {
            cancelAnimationFrame(animationId);
            window.removeEventListener("resize", resizeCanvas);
            window.removeEventListener("pointermove", onPointerMove);
            window.removeEventListener("beforeunload", cleanup);
        });
    })();
</script>
